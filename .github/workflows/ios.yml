name: iOS App Store Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Cap sync iOS
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Decode signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12 }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p signing
          echo "$CERT_P12_BASE64" | tr -d ' \n\r' | base64 --decode > signing/cert.p12
          echo "$PROFILE_BASE64" | tr -d ' \n\r' | base64 --decode > signing/profile.mobileprovision
          echo "cert.p12 size: $(wc -c < signing/cert.p12) bytes"
          echo "profile size: $(wc -c < signing/profile.mobileprovision) bytes"

      - name: Run Fastlane deploy
        env:
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: fastlane ios deploy
