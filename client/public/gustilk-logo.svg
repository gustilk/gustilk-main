<svg xmlns="http://www.w3.org/2000/svg" viewBox="120 20 560 640" width="560" height="640">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C547"/>
      <stop offset="30%" stop-color="#D4A017"/>
      <stop offset="50%" stop-color="#F0D060"/>
      <stop offset="70%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#C49000"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D42B2B"/>
      <stop offset="40%" stop-color="#C41E1E"/>
      <stop offset="100%" stop-color="#A01515"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F8F8F8"/>
      <stop offset="100%" stop-color="#EFEFEF"/>
    </linearGradient>
    <radialGradient id="eyeBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0044AA"/>
      <stop offset="60%" stop-color="#0066CC"/>
      <stop offset="100%" stop-color="#1155BB"/>
    </radialGradient>
    <radialGradient id="eyeGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00AA55"/>
      <stop offset="40%" stop-color="#22BB66"/>
      <stop offset="100%" stop-color="#118B33"/>
    </radialGradient>
    <linearGradient id="featherGold" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="50%" stop-color="#E8C547"/>
      <stop offset="100%" stop-color="#C49000"/>
    </linearGradient>

    <!-- S-curve clip for red (left) side -->
    <clipPath id="clipCurveLeft">
      <path d="M0,0 L400,0 L400,194
               C430,290 430,340 410,400
               C390,460 380,520 400,625
               L0,700 Z"/>
    </clipPath>

    <!-- S-curve clip for white (right) side -->
    <clipPath id="clipCurveRight">
      <path d="M800,0 L400,0 L400,194
               C430,290 430,340 410,400
               C390,460 380,520 400,625
               L800,700 Z"/>
    </clipPath>
  </defs>

  <!-- Gold outline heart -->
  <path d="M400,640 C400,640 160,460 160,295 C160,205 225,148 310,148 C358,148 392,172 400,185 C408,172 442,148 490,148 C575,148 640,205 640,295 C640,460 400,640 400,640 Z"
        fill="url(#goldGrad)" />

  <!-- Red left half with S-curve -->
  <g clip-path="url(#clipCurveLeft)">
    <path d="M400,625 C400,625 172,448 172,296 C172,212 233,162 313,162 C358,162 390,184 400,197 C408,184 442,162 487,162 C567,162 628,212 628,296 C628,448 400,625 400,625 Z"
          fill="url(#redGrad)" />
  </g>

  <!-- White right half with S-curve -->
  <g clip-path="url(#clipCurveRight)">
    <path d="M400,625 C400,625 172,448 172,296 C172,212 233,162 313,162 C358,162 390,184 400,197 C408,184 442,162 487,162 C567,162 628,212 628,296 C628,448 400,625 400,625 Z"
          fill="url(#whiteGrad)" />
  </g>

  <!-- Gold S-curve divider line -->
  <path d="M400,194 C430,290 430,340 410,400 C390,460 380,520 400,625"
        fill="none" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- Feather barbs - left -->
  <g opacity="0.9">
    <path d="M400,165 C380,130 340,80 320,40" fill="none" stroke="url(#featherGold)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M400,165 C385,128 355,85 340,48" fill="none" stroke="url(#featherGold)" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M400,165 C388,125 365,88 355,55" fill="none" stroke="url(#featherGold)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M400,165 C392,122 375,90 365,60" fill="none" stroke="url(#featherGold)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M400,165 C394,120 382,92 374,65" fill="none" stroke="url(#featherGold)" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M400,165 C396,118 388,93 382,68" fill="none" stroke="url(#featherGold)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M400,165 C397,116 392,94 388,72" fill="none" stroke="url(#featherGold)" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M400,165 C398,115 395,95 393,75" fill="none" stroke="url(#featherGold)" stroke-width="1.0" stroke-linecap="round"/>
    <path d="M400,165 C399,114 397,96 397,78" fill="none" stroke="url(#featherGold)" stroke-width="0.9" stroke-linecap="round"/>
  </g>

  <!-- Feather barbs - right -->
  <g opacity="0.9">
    <path d="M400,165 C420,130 460,80 480,40" fill="none" stroke="url(#featherGold)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M400,165 C415,128 445,85 460,48" fill="none" stroke="url(#featherGold)" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M400,165 C412,125 435,88 445,55" fill="none" stroke="url(#featherGold)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M400,165 C408,122 425,90 435,60" fill="none" stroke="url(#featherGold)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M400,165 C406,120 418,92 426,65" fill="none" stroke="url(#featherGold)" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M400,165 C404,118 412,93 418,68" fill="none" stroke="url(#featherGold)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M400,165 C403,116 408,94 412,72" fill="none" stroke="url(#featherGold)" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M400,165 C402,115 405,95 407,75" fill="none" stroke="url(#featherGold)" stroke-width="1.0" stroke-linecap="round"/>
    <path d="M400,165 C401,114 403,96 403,78" fill="none" stroke="url(#featherGold)" stroke-width="0.9" stroke-linecap="round"/>
  </g>

  <!-- Feather shaft -->
  <line x1="400" y1="175" x2="400" y2="55" stroke="#B8860B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Peacock eye -->
  <ellipse cx="400" cy="130" rx="28" ry="32" fill="#8B7332"/>
  <ellipse cx="400" cy="130" rx="22" ry="26" fill="url(#eyeGreen)"/>
  <ellipse cx="400" cy="130" rx="15" ry="18" fill="#006688"/>
  <ellipse cx="400" cy="130" rx="10" ry="12" fill="url(#eyeBlue)"/>
  <ellipse cx="396" cy="125" rx="4" ry="5" fill="rgba(255,255,255,0.35)"/>
</svg>
